kind = "web"
previewPath = "/"
title = "Code IDE"
version = "1.0.0"
id = "artifacts/ide"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18624

[services.development]
run = "pnpm --filter @workspace/ide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ide", "run", "build" ]
publicDir = "artifacts/ide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18624"
BASE_PATH = "/"
